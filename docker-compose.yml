version: '3.8'

services:
  world-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: world-monitor
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/app/backend/data
    environment:
      - NODE_ENV=production
      - PORT=3001
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
